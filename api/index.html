<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EA Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-shell">
    <div class="page-container">
        <header class="page-header">
            <div>
                <h1>EA Dashboard</h1>
                <p class="subtitle">ภาพรวมระบบเทรดอัตโนมัติ</p>
            </div>
            <div id="status-container" class="status-pill">
                <span id="status-indicator" class="status-dot disconnected"></span>
                <span id="status-text">Connecting...</span>
            </div>
        </header>

        <main class="dashboard-grid">
            <section class="dashboard-row">
                <div class="glass-card">
                    <h3>Total Balance</h3>
                    <p id="total-balance" class="value">$0.00</p>
                </div>
                <div class="glass-card">
                    <h3>Total Equity</h3>
                    <p id="total-equity" class="value accent">$0.00</p>
                </div>
                <div class="glass-card">
                    <h3>Floating P/L</h3>
                    <p id="total-floating-pl" class="value negative">$0.00</p>
                </div>
                <div class="glass-card">
                    <h3>Accounts</h3>
                    <p id="account-count" class="value">0</p>
                </div>
            </section>

            <section class="dashboard-row profit-highlights">
                <div class="glass-card profit-card">
                    <h3>Daily Profit</h3>
                    <p id="daily-profit" class="value positive">$0.00</p>
                </div>
                <div class="glass-card profit-card">
                    <h3>Weekly Profit</h3>
                    <p id="weekly-profit" class="value positive">$0.00</p>
                </div>
                <div class="glass-card profit-card">
                    <h3>Monthly Profit</h3>
                    <p id="monthly-profit" class="value positive">$0.00</p>
                </div>
            </section>

            <section id="accounts-table-container" class="glass-card table-card"></section>

            <section class="glass-card chart-card">
                <div class="card-header">
                    <h2>Total Equity Curve (Last 7 Days)</h2>
                </div>
                <div class="chart-wrapper">
                    <canvas id="equity-chart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal Structure (Hidden by default) -->
    <div id="details-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2 id="modal-account-name">Account Details</h2>
            <div id="modal-body">
                <!-- Details will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
